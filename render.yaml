databases:
  - name: saas-template-staging-db
    databaseName: saas_template_staging
    plan: basic-256mb
    region: virginia

services:
  - type: web
    name: saas-template-staging-web
    runtime: ruby
    plan: starter
    region: virginia
    branch: main
    buildCommand: "./bin/render-build.sh"
    preDeployCommand: "bundle exec rails db:migrate"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: SAAS_TEMPLATE_DATABASE_URL
        fromDatabase:
          name: saas-template-staging-db
          property: connectionString
      - key: GOOD_JOB_EXECUTION_MODE
        value: async
      - key: RAILS_ENV
        value: staging
      - key: APP_CANONICAL_HOST
        value: "staging.example.com"
